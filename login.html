<!DOCTYPE html>
<html lang="es-MX">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script src="js/utileria.js"></script>
        <link rel="stylesheet" href="css/utileria.css" />
    </head>
    <body>
        <div class="contenedor-formulario">
            <h1>INGRESA A NUESTRO SITIO</h1>
            <p class="subtitulo">
                En este formulario <strong>validaremos tus datos</strong> para poder determinar si eres apto para acceder al sitio.
            </p>
            <p class="subtitulo">Porfavor rellena el siguiente formulario:</p>
            <br>

            <!-- Formulario -->
            <div class="formulario">
                <form name="nameForm">

                    <!-- Nombre del usuario -->
                    <label for="nombre">Nombre completo: </label>
                    <input
                        type="text"
                        id="fnombre"
                        name="fnombre"
                        placeholder="Ej: Juan Roblez"
                        required
                    />
                </form>

                <!-- Datos de contacto del usuario -->
                <div class="grupo-doble">
                    <!-- Si el correp esta vacio, esta funcion alerta con un mensaje y retorna falso-->
                    <form name="emailForm">

                        <!-- Email -->
                        <label for="email">Email: </label>
                        <input
                            type="email"
                            id="email"
                            name="femail"
                            placeholder="correo@gmail.com"
                            required
                        />
                    </form>
                    <form name="passwordForm">

                        <!-- Password -->
                        <label for="password">Contraseña: </label>
                        <input
                            type="password"
                            id="password"
                            name="fpassword"
                            required
                        />
                    </form>
                    <form name="telForm">
                        <!-- Telefono -->
                        <label for="telefono"
                            >Telefono <span>(opcional):</span></label>
                        <input
                            type="tel"
                            id="telefono"
                            name="ftelefono"
                            placeholder="951-654-57-34"
                            pattern="[0-9]{3}-[0-9]{3}-[0-9]{2}-[0-9]{2}"
                        />
                    </form>

                    <!-- Comprobacion de edad -->
                    <div class="grupo-doble">
                        <form name="edadForm">

                            <!--Introuccion de fecha de nacimiento -->
                            <label for="birthday">Fecha de nacimiento: </label>
                            <input
                                type="date"
                                id="birthday"
                                name="fbirthday"
                                min="1930-01-01"
                                max="2026-12-31"
                                required
                            />
                        </form>
                        <!-- Boton para ingresar al sitio (solo valida) -->
                    <button type="button" onclick="Calc()">Ingresa</button>
                </div>
            </div>
    </body>

</html>
